name: Push Flux config as OCI artifact

on:
  push:
    branches: [main]
    paths:
      - 'flux-config/**'
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git rev-list ${TAG}..HEAD --count 2>/dev/null || git rev-list HEAD --count)
          SEMVER="${TAG#v}"
          if [[ "$COMMITS" -gt 0 ]]; then
            SEMVER="${SEMVER}-${COMMITS}-g$(git rev-parse --short HEAD)"
          fi
          echo "tag=${SEMVER}" >> $GITHUB_OUTPUT
          echo "tag_ts=${SEMVER}-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Push OCI artifact
        id: push
        run: |
          digest=$(flux push artifact oci://ghcr.io/${{ github.repository }}/flux-config:${{ steps.version.outputs.tag }} \
            --path="./flux-config" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Tag artifact
        run: |
          flux tag artifact \
            oci://ghcr.io/${{ github.repository }}/flux-config:${{ steps.version.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag ${{ steps.version.outputs.tag_ts }} \
            --tag latest
